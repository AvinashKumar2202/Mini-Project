<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="roundSquare">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="60%" style="stop-color:#8B7CF8"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background (transparent) -->
  <rect width="512" height="512" rx="110" ry="110" fill="transparent"/>
  <rect width="512" height="512" rx="110" ry="110" fill="url(#innerGlow)"/>

  <!-- SAAN text -->
  <text x="256" y="260" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900"
    font-size="134" letter-spacing="-2" text-anchor="middle" fill="url(#textGrad)" filter="url(#glow)">SAAN</text>

  <!-- AI badge pill -->
  <rect x="176" y="286" width="160" height="50" rx="25" fill="url(#aiGrad)"/>
    
  <text x="256" y="322" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900"
    font-size="24" letter-spacing="8" text-anchor="middle" fill="#ffffff">AI</text>

  <!-- Accent underline -->
  <rect x="96" y="354" width="320" height="5" rx="2.5" fill="url(#accentGrad)" opacity="0.85"/>
  <circle cx="96" cy="356.5" r="5" fill="#A78BFA"/>
  <circle cx="416" cy="356.5" r="5" fill="#00D4AA"/>

  <!-- Sparkle dots -->
  <circle cx="400" cy="98" r="5" fill="#00D4AA" opacity="0.8"/>
  <circle cx="422" cy="118" r="3" fill="#A78BFA" opacity="0.6"/>
  <circle cx="96" cy="388" r="4" fill="#6C63FF" opacity="0.7"/>
  <circle cx="76" cy="126" r="3.5" fill="#00D4AA" opacity="0.5"/>
</svg>
